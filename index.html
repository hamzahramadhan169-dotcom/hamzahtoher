<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apakah Kamu Alien?</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        padding: 20px;
        color: white;
      }

      .container {
        width: 100%;
        max-width: 350px;
        text-align: center;

        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);

        padding: 40px 20px;
        border-radius: 20px;

        box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
      }

      h1 {
        font-size: clamp(24px, 6vw, 34px);
        margin-bottom: 30px;
        line-height: 1.3;
      }

      h2 {
        font-size: clamp(22px, 5vw, 30px);
        line-height: 1.4;
      }

      .btns {
        display: flex;
        justify-content: center;
        gap: 15px;
        flex-wrap: wrap;
      }

      button {
        border: none;
        padding: 12px 28px;
        border-radius: 14px;
        cursor: pointer;

        font-size: 17px;
        font-weight: bold;

        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.08);
      }

      .yes {
        background: #22c55e;
        color: white;
      }

      .no {
        background: #ef4444;
        color: white;
      }

      #result {
        display: none;
      }

      @media screen and (max-width: 400px) {
        .container {
          padding: 35px 18px;
        }

        button {
          width: 100%;
        }

        .btns {
          flex-direction: column;
        }

        .from {
          margin-bottom: 15px;
          font-size: 14px;
          opacity: 0.8;
          letter-spacing: 1px;
        }
      }
    </style>
  </head>
  <body>
    <!-- HALAMAN PERTANYAAN -->
    <div class="container" id="questionBox">
      <p class="from">Dari Hamzah Ganteng 😎</p>
      <h1>🧸 Jangan marah mulu ya kalo chat ama hamzah!!!</h1>

      <div class="btns">
        <button class="yes" onclick="jawabIya()">Iya</button>

        <button class="no" onclick="jawabTidak()">Tidak</button>
      </div>
    </div>

    <!-- HALAMAN HASIL -->
    <div class="container" id="result">
      <h2>
        😎 Yesss bagus,<br />
        sekarang jan marah-marah, nanti cepet tua!
      </h2>
    </div>

    <script>
      function jawabIya() {
        document.getElementById("questionBox").style.display = "none";
        document.getElementById("result").style.display = "block";
      }

      function jawabTidak() {
        alert("😈 Tidak valid, kamu harus pilih 'Iya'!");
      }

      function jawabIya() {
        let nomor = "6285764113183";

        let pesan = "Halo kia sudah engga akan marah-marah lagi 🎁";

        document.getElementById("questionBox").style.display = "none";
        document.getElementById("result").style.display = "block";

        window.open(
          `https://wa.me/${nomor}?text=${encodeURIComponent(pesan)}`,
          "_blank",
        );
      }

      function jawabTidak() {
        alert("😈 Tidak valid, kamu harus pilih 'Iya'!");
      }
    </script>
  </body>
</html>
